# HTTPS — основной сервер для домена
server {
    listen 443 ssl;
    server_name adamovich22.ru www.adamovich22.ru;

    root /var/www/numerology;
    index index.html;

    # SSL — управляется Certbot
    ssl_certificate /etc/letsencrypt/live/adamovich22.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adamovich22.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ =404;
    }

    # Кэш видео
    location ~* \.mp4$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header Accept-Ranges bytes;
    }

    # Кэш статики
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}

# HTTP → HTTPS редирект для домена (исправлен баг Certbot с return 404)
server {
    listen 80;
    server_name adamovich22.ru www.adamovich22.ru;
    return 301 https://adamovich22.ru$request_uri;
}

# Запросы по IP — редирект на домен
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    # Самоподписанный сертификат для fallback (или используем основной)
    ssl_certificate /etc/letsencrypt/live/adamovich22.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adamovich22.ru/privkey.pem;

    return 301 https://adamovich22.ru$request_uri;
}
